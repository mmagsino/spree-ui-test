# Base URL for the application under test
app.base.url=https://demo.spreecommerce.org

# Browser: chromium (headless default), chrome (installed Google Chrome), firefox, webkit
app.browser.name=chromium
# Run with visible browser window (false) or headless (true)
app.browser.headless=true

# Example page URL (e.g. Playwright docs)
app.example.url=https://playwright.dev

# Page paths (relative to base URL)
app.path.home=/
app.path.products=/products
app.path.cart=/cart
app.path.login=/user/sign_in
app.path.signup=/user/sign_up
app.path.checkout=/checkout

# Test card details (Spree/Vendo test transactions)
# Refer to: https://docs.vendoservices.com/docs/how-to-run-test-transactions
test.card.number=4111111111111111
test.card.cvv=123
test.card.expiry=12/28
test.card.holder.name=Test User

# Viewport
app.viewport.width=1280
app.viewport.height=720

# Delay in milliseconds between each step (0 to disable). Use 2000 for 2 second slowdown.
app.execution.step.delay.ms=2000

