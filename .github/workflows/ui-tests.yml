name: UI Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ui-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and install dependencies
        run: mvn install -DskipTests -q

      - name: Install Playwright browsers (Chromium)
        run: sudo mvn exec:java -e -D exec.mainClass=com.microsoft.playwright.CLI -D exec.args="install-deps" -pl tests -q

      - name: Run UI tests
        run: mvn test -pl tests -Dapp.browser.name=chromium -Dapp.browser.headless=true -Dapp.execution.step.delay.ms=0
        env:
          CI: true

      - name: Copy reports to test-reports directory
        run: |
          mkdir -p test-reports
          cp tests/target/cucumber-reports.html test-reports/ 2>/dev/null || true
          cp -r tests/target/videos test-reports/ 2>/dev/null || true
          cp -r tests/target/screenshots test-reports/ 2>/dev/null || true
          cp -r tests/target/surefire-reports test-reports/ 2>/dev/null || true

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: test-reports/
          retention-days: 7
